- url: https://api.ipaas.test.eis.ns2n.corp.hmrc.gov.uk/etmp
  description: Corporate - Test
- url: https://hip.ws.hmrc.gov.uk/etmp
  description: MDTP - Production
- url: https://hip.ws.ibt.hmrc.gov.uk/etmp
