- oAuth2:
  - write:qrops-transfer
  - read:qrops-transfer
tags:
- name: pods-qrops-transfer
  description: Pensions Online Digital Service - Qualifying Recognised Overseas Pension
    Scheme Transfer
paths:
  /RESTAdapter/pods/reports/qrops-transfer:
    get:
      tags:
      - pods-qrops-transfer
      summary: Consumer to ETMP QROPS Transfer GET Operation
      description: "This operation covers actions to Get QROPS Transfer. QTs will\
        \ be displayed by a Pension Scheme Administrator (PSA) or authorised Pension\
        \ Scheme Practitioner (PSP).\n \nThe call is synchronous.\n \nFor the successful\
        \ scenario the API will return successful response. \nFor the unsuccessful\
        \ scenario, the API will return error messages from ETMP or ETMP's middleware.\n\
        \n**EPID reference:** \n- EPID1562\n- HIP OAS EPID1585"
      parameters:
      - name: correlationid
        in: header
        description: |
          Unique alphanumeric number used for correlation purposes, generated by the originating system and conforming to 36-character UUID (formatted).
        required: true
        schema:
          pattern: "^[0-9a-fA-F]{8}[-][0-9a-fA-F]{4}[-][0-9a-fA-F]{4}[-][0-9a-fA-F]{4}[-][0-9a-fA-F]{12}$"
          type: string
        deprecated: false
        style: simple
        explode: false
        example: f0bd1f32-de51-45cc-9b18-0520d6e3ab1a
      - name: fbNumber
        in: query
        description: Form Bundle Number (cannot be used with QTNumber and VersionNumber)
        required: false
        schema:
          pattern: "^[0-9]{12}$"
          type: string
        allowEmptyValue: false
        deprecated: false
        style: form
        explode: true
        example: "123456789012"
      - name: pstr
        in: query
        description: Scheme Identifier (must be combined with FBNumber OR (QTNumber
          AND VersionNumber))
        required: true
        schema:
          pattern: "^[0-9]{8}[A-Z]{2}$"
          type: string
        allowEmptyValue: false
        deprecated: false
        style: form
        explode: true
        example: 12345678AB
      - name: qtNumber
        in: query
        description: QT Reference Number (must be used with VersionNumber)
        required: false
        schema:
          format: "QT[0-9]{6}"
          type: string
        allowEmptyValue: false
        deprecated: false
        style: form
        explode: true
        example: QT123456
      - name: versionNumber
        in: query
        description: Version Number (must be used with QTNumber)
        required: false
        schema:
          pattern: "^[0-9]{3}$"
          type: string
        allowEmptyValue: false
        deprecated: false
        style: form
        explode: true
        example: "001"
      - name: X-Message-Type
        in: header
        required: true
        schema:
          enum:
          - GetQROPSTransfer
          type: string
        deprecated: false
        style: simple
        explode: false
      - name: X-Originating-System
        in: header
        description: "System that is the originator of the message. \n"
        required: true
        schema:
          maxLength: 30
          minLength: 1
          type: string
        deprecated: false
        style: simple
        explode: false
        example: MDTP
      - name: X-Receipt-Date
        in: header
        description: "The time the message was created by the system sending the message.\
          \ The value should follow this date-time pattern, and be represented in\
          \ the UTC time zone: yyyy-MM-ddTHH:mm:ssZ"
        required: true
        schema:
          format: date-time
          type: string
        deprecated: false
        style: simple
        explode: false
        example: 2025-01-30T23:59:59Z
      - name: X-Regime-Type
        in: header
        required: true
        schema:
          enum:
          - PODS
          type: string
        deprecated: false
        style: simple
        explode: false
      - name: X-Transmitting-System
        in: header
        description: "Intermediary system that performs the transmission of the message.\
          \ \n-\tFixed value of 'HIP' required.\n"
        required: true
        schema:
          enum:
          - HIP
          type: string
        deprecated: false
        style: simple
        explode: false
      responses:
        "200":
          description: ETMP has successfully accepted the request and will display
            QROPS Transfer.
          headers:
            correlationid:
              $ref: '#/components/headers/correlationidResponseType'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/podsQROPSGetResponseSchemaSuccess'
              examples:
                Sample Response Success:
                  $ref: '#/components/examples/podsQROPSGetSampleResponseSuccess'
        "400":
          description: Bad Request
          headers:
            correlationid:
              $ref: '#/components/headers/correlationidResponseType'
          content:
            application/json:
              schema:
                required:
                - origin
                - response
                type: object
                properties:
                  origin:
                    $ref: '#/components/schemas/HIP-originEnum'
                  response:
                    oneOf:
                    - $ref: '#/components/schemas/HIP-failureResponse'
                    - $ref: '#/components/schemas/responseSystemErrorType'
                additionalProperties: false
              examples:
                Bad Request:
                  value:
                    origin: HoD
                    response:
                      error:
                        code: "400"
                        logID: C0000AB8190C86300000000200006836
                        message: "Invalid&#x20;JSON&#x20;message&#x20;content&#x20;used&#x3b;&#x20;Message&#x3a;&#x20;&quot;Expected&#x20;a&#x20;&#x27;,&#x27;&#x20;or&#x20;&#x27;&#x7d;&#x27;&#x20;at&#x20;character&#x20;93&#x20;of&#x20;&#x7b;&#xa;&#x9;&quot;idType&quot;&#x3a;&#x20;&quot;EMPREF&quot;,&#xa;&#x9;&quot;idValue&quot;&#x3a;&#x20;&quot;864FZ00049&quot;,&#xa;&#x9;&quot;regimeType&quot;&#x3a;&#x20;&quot;PAYE&quot;,&#xa;&#x9;&quot;lockReason&quot;&#x3a;&#x20;&quot;8&quot;&#xa;&#x9;&quot;chargeReferences&quot;&#x3a;&#x20;&#x5b;&#xa;&#x9;&#x9;&quot;XM123456789812&quot;,&#xa;&#x9;&#x9;&quot;XM123456781234&quot;,&#xa;&#x9;&#x9;&quot;XC123111781234&quot;&#xa;&#x9;&#x5d;,&#x9;&#xa;&#x9;&quot;createNote&quot;&#x3a;&#x20;true,&#xa;&#x9;&quot;noteType&quot;&#x3a;&#x20;&quot;TTP&quot;,&#xa;&#x9;&quot;noteLines&quot;&#x3a;&#x20;&#x5b;&#xa;&#x9;&#x9;&quot;paymentPlanType&#x3a;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;TTP&quot;,&#xa;&#x9;&#x9;&quot;arrangementAgreedDate&#x3a;&#x20;2022-02-01&quot;,&#xa;&#x9;&#x9;&quot;arrangementChannel&#x3a;&#x20;&#x20;&#x20;&#x20;ePAYE&quot;,&#xa;&#x9;&#x9;&quot;firstPaymentAmount&#x3a;&#x20;&#x20;&#x20;&#x20;1234.56&quot;,&#xa;&#x9;&#x9;&quot;firstPaymentDate&#x3a;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;2022-03-01&quot;,&#xa;&#x9;&#x9;&quot;regularPaymentAmount&#x3a;&#x20;&#x20;1000&quot;,&#xa;&#x9;&#x9;&quot;paymentFrequency&#x3a;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;Monthly&quot;,&#xa;&#x9;&#x9;&quot;arrangementReviewDate&#x3a;&#x20;2022-11-02&quot;,&#xa;&#x9;&#x9;&quot;ddiReference&#x3a;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;123456789012&quot;&#xa;&#x9;&#x5d;&#xa;&#x7d;&quot;"
                HIP-originResponse:
                  description: HIP-originResponse
                  value:
                    origin: HIP
                    response:
                    - type: Type of Failure
                      reason: Reason for Failure
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not Found
        "415":
          description: Unsupported media-type
        "422":
          description: "ETMP validation errors. \nErrors of this kind indicate that\
            \ ETMP successfully received the data without any technical issues, however\
            \ it is unable to process the data further for the reason given by the\
            \ code and text.\n\n```\n[ code | text]\n001 | REGIME missing or invalid\n\
            003 | Request could not be processed\n049 | Invalid PSTR\n055 | Form Bundle\
            \ not found for the given PSTR <PSTR>\n182 | Invalid QT Reference Provided\n\
            183 | No QT found in ETMP for the requested details\n999 | Technical Error\n\
            \n"
          headers:
            correlationid:
              $ref: '#/components/headers/correlationidResponseType'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/podsQROPSGetEtmpErrorsType'
              examples:
                Business Validation Error:
                  $ref: '#/components/examples/podsQROPSGetSample422ErrorResponse'
        "500":
          description: Internal Server Error
          headers:
            correlationid:
              $ref: '#/components/headers/correlationidResponseType'
          content:
            application/json:
              schema:
                required:
                - origin
                - response
                type: object
                properties:
                  origin:
                    $ref: '#/components/schemas/HIP-originEnum'
                  response:
                    oneOf:
                    - $ref: '#/components/schemas/HIP-failureResponse'
                    - $ref: '#/components/schemas/responseSystemErrorType'
                additionalProperties: false
              examples:
                Internal Server Error:
                  value:
                    origin: HoD
                    response:
                      error:
                        code: "500"
                        logID: C0000AB8190C8E1F000000C700006836
                        message: Error&#x20;while&#x20;sending&#x20;message&#x20;to&#x20;module&#x20;processor&#x3a;&#x20;Sender&#x20;Channel&#x20;&#x27;CCOS_01_REST_Out_eSSTTP_PaymentLock_Set&#x27;&#x20;&#x28;ID&#x3a;&#x20;624ce8b4f8773eb0b227f1a90b6f40a5&#x29;&#x3a;&#x20;Catching&#x20;exception&#x20;calling&#x20;messaging&#x20;system&#x3a;&#x20;com.sap.aii.af.sdk.xi.srt.BubbleException&#x3a;&#x20;System&#x20;Error&#x20;Received.&#x20;HTTP&#x20;Status&#x20;Code&#x20;&#x3d;&#x20;200&#x3a;&#x20;However&#x20;System&#x20;Error&#x20;received&#x20;in&#x20;payload&#x20;ErrorCode&#x20;&#x3d;&#x20;INCORRECT_PAYLOAD_DATA&#x20;ErrorCategory&#x20;&#x3d;&#x20;XIServer&#x20;Parameter1&#x20;&#x3d;&#x20;&#x20;Parameter2&#x20;&#x3d;&#x20;&#x20;Parameter3&#x20;&#x3d;&#x20;&#x20;Parameter4&#x20;&#x3d;&#x20;&#x20;Additional&#x20;text&#x20;&#x3d;&#x20;&#x20;ErrorStack&#x20;&#x3d;&#x20;Error&#x20;while&#x20;processing&#x20;message&#x20;payload&#xa;&#xa;An&#x20;error&#x20;occurred&#x20;when&#x20;deserializing&#x20;in&#x20;the&#x20;simple&#x20;transformation&#x20;program&#x20;&#x2f;1SAI&#x2f;SAS476436EAEE64FB2B9096&#xa;Value&#x20;is&#x20;longer&#x20;than&#x20;the&#x20;maximum&#x20;permitted&#x20;length&#x20;15&#x3a;&#x20;&quot;864FZ077777770049&quot;&#xa;&#x20;&#x5b;http&#x3a;&#x2f;&#x2f;sap.com&#x2f;xi&#x2f;XI&#x2f;Message&#x2f;30&#x5e;Error&#x20;&quot;INCORRECT_PAYLOAD_DATA&quot;&#x5d;
                HIP-originResponse:
                  description: HIP-originResponse
                  value:
                    origin: HIP
                    response:
                    - type: Type of Failure
                      reason: Reason for Failure
        "503":
          description: Service Unavailable
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/HIP-originResponse'
      deprecated: false
    post:
      tags:
      - pods-qrops-transfer
      summary: Consumer to ETMP QROPS Transfer Submit and Compile Operation
      description: "This operation covers actions to compile and submit the QROPS\
        \ Transfer. QT's will be filed by a Pension Scheme Administrator (PSA) or\
        \ authorised Pension Scheme Practitioner (PSP).\n \nThe call is synchronous.\n\
        \ \nFor the successful scenario the API will return Processing date and Form\
        \ bundle number. \nFor the unsuccessful scenario, the API will return error\
        \ messages from ETMP or ETMP's middleware.\n\n**EPID reference:** \n- EPID1561\n\
        - HIP OAS EPID1585"
      operationId: submitOrCompileQROPSTransfer
      parameters:
      - name: correlationid
        in: header
        description: |
          Unique alphanumeric number used for correlation purposes, generated by the originating system and conforming to 36-character UUID (formatted).
        required: true
        schema:
          pattern: "^[0-9a-fA-F]{8}[-][0-9a-fA-F]{4}[-][0-9a-fA-F]{4}[-][0-9a-fA-F]{4}[-][0-9a-fA-F]{12}$"
          type: string
        deprecated: false
        style: simple
        explode: false
        example: f0bd1f32-de51-45cc-9b18-0520d6e3ab1a
      - name: X-Message-Type
        in: header
        required: true
        schema:
          enum:
          - FileQROPSTransfer
          type: string
        deprecated: false
        style: simple
        explode: false
      - name: X-Originating-System
        in: header
        description: "System that is the originator of the message. \n"
        required: true
        schema:
          maxLength: 30
          minLength: 1
          type: string
        deprecated: false
        style: simple
        explode: false
        example: MDTP
      - name: X-Receipt-Date
        in: header
        description: "The time the message was created by the system sending the message.\
          \ The value should follow this date-time pattern, and be represented in\
          \ the UTC time zone: yyyy-MM-ddTHH:mm:ssZ"
        required: true
        schema:
          format: date-time
          type: string
        deprecated: false
        style: simple
        explode: false
        example: 2025-01-30T23:59:59Z
      - name: X-Regime-Type
        in: header
        required: true
        schema:
          enum:
          - PODS
          type: string
        deprecated: false
        style: simple
        explode: false
      - name: X-Transmitting-System
        in: header
        description: "Intermediary system that performs the transmission of the message.\
          \ \n-\tFixed value of 'HIP' required.\n"
        required: true
        schema:
          enum:
          - HIP
          type: string
        deprecated: false
        style: simple
        explode: false
      requestBody:
        description: Request structure
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/podsQROPSCreateRequestSchema'
            examples:
              Sample Request Data:
                $ref: '#/components/examples/podsQROPSCreateSampleRequestData'
        required: false
      responses:
        "201":
          description: ETMP has successfully accepted the request and will process
            to file QROPS Transfer.
          headers:
            correlationid:
              $ref: '#/components/headers/correlationidResponseType'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/podsQROPSCreateResponseSchemaSuccess'
              examples:
                Sample Response Success:
                  $ref: '#/components/examples/podsQROPSCreateSampleResponseSuccess'
        "400":
          description: Bad Request
          headers:
            correlationid:
              $ref: '#/components/headers/correlationidResponseType'
          content:
            application/json:
              schema:
                required:
                - origin
                - response
                type: object
                properties:
                  origin:
                    $ref: '#/components/schemas/HIP-originEnum'
                  response:
                    oneOf:
                    - $ref: '#/components/schemas/HIP-failureResponse'
                    - $ref: '#/components/schemas/responseSystemErrorType'
                additionalProperties: false
              examples:
                Bad Request:
                  value:
                    origin: HoD
                    response:
                      error:
                        code: "400"
                        logID: C0000AB8190C86300000000200006836
                        message: "Invalid&#x20;JSON&#x20;message&#x20;content&#x20;used&#x3b;&#x20;Message&#x3a;&#x20;&quot;Expected&#x20;a&#x20;&#x27;,&#x27;&#x20;or&#x20;&#x27;&#x7d;&#x27;&#x20;at&#x20;character&#x20;93&#x20;of&#x20;&#x7b;&#xa;&#x9;&quot;idType&quot;&#x3a;&#x20;&quot;EMPREF&quot;,&#xa;&#x9;&quot;idValue&quot;&#x3a;&#x20;&quot;864FZ00049&quot;,&#xa;&#x9;&quot;regimeType&quot;&#x3a;&#x20;&quot;PAYE&quot;,&#xa;&#x9;&quot;lockReason&quot;&#x3a;&#x20;&quot;8&quot;&#xa;&#x9;&quot;chargeReferences&quot;&#x3a;&#x20;&#x5b;&#xa;&#x9;&#x9;&quot;XM123456789812&quot;,&#xa;&#x9;&#x9;&quot;XM123456781234&quot;,&#xa;&#x9;&#x9;&quot;XC123111781234&quot;&#xa;&#x9;&#x5d;,&#x9;&#xa;&#x9;&quot;createNote&quot;&#x3a;&#x20;true,&#xa;&#x9;&quot;noteType&quot;&#x3a;&#x20;&quot;TTP&quot;,&#xa;&#x9;&quot;noteLines&quot;&#x3a;&#x20;&#x5b;&#xa;&#x9;&#x9;&quot;paymentPlanType&#x3a;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;TTP&quot;,&#xa;&#x9;&#x9;&quot;arrangementAgreedDate&#x3a;&#x20;2022-02-01&quot;,&#xa;&#x9;&#x9;&quot;arrangementChannel&#x3a;&#x20;&#x20;&#x20;&#x20;ePAYE&quot;,&#xa;&#x9;&#x9;&quot;firstPaymentAmount&#x3a;&#x20;&#x20;&#x20;&#x20;1234.56&quot;,&#xa;&#x9;&#x9;&quot;firstPaymentDate&#x3a;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;2022-03-01&quot;,&#xa;&#x9;&#x9;&quot;regularPaymentAmount&#x3a;&#x20;&#x20;1000&quot;,&#xa;&#x9;&#x9;&quot;paymentFrequency&#x3a;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;Monthly&quot;,&#xa;&#x9;&#x9;&quot;arrangementReviewDate&#x3a;&#x20;2022-11-02&quot;,&#xa;&#x9;&#x9;&quot;ddiReference&#x3a;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;&#x20;123456789012&quot;&#xa;&#x9;&#x5d;&#xa;&#x7d;&quot;"
                HIP-originResponse:
                  description: HIP-originResponse
                  value:
                    origin: HIP
                    response:
                    - type: Type of Failure
                      reason: Reason for Failure
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not Found
        "415":
          description: Unsupported media-type
        "422":
          description: "ETMP validation errors. \nErrors of this kind indicate that\
            \ ETMP successfully received the data without any technical issues, however\
            \ it is unable to process the data further for the reason given by the\
            \ code and text.\n\n```\n[ code | text]\n001 | REGIME missing or invalid\n\
            003 | Request could not be processed\n004 | Duplicate submission acknowledgment\
            \ reference\n046 | Invalid PSAID\n058 | No relationship exists between\
            \ the PSAID and the scheme\n090 | Invalid PSPID <PSPID>\n091 | No relationship\
            \ exists between the PSPID <PSPID> and the scheme <PSTR>\n092 | PSAID\
            \ is mandatory if the declaration is provided by PSP\n093 | PSP <PSPID>\
            \ is not authorized by PSA <PSAID>\n171 | Declaration is missing\n182\
            \ | Invalid QT Reference Provided\n999 | Technical Error\n\n"
          headers:
            correlationid:
              $ref: '#/components/headers/correlationidResponseType'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/podsQROPSCreateEtmpErrorsType'
              examples:
                Business Validation Error:
                  $ref: '#/components/examples/podsQROPSCreateSample422ErrorResponse'
        "500":
          description: Internal Server Error
          headers:
            correlationid:
              $ref: '#/components/headers/correlationidResponseType'
          content:
            application/json:
              schema:
                required:
                - origin
                - response
                type: object
                properties:
                  origin:
                    $ref: '#/components/schemas/HIP-originEnum'
                  response:
                    oneOf:
                    - $ref: '#/components/schemas/HIP-failureResponse'
                    - $ref: '#/components/schemas/responseSystemErrorType'
                additionalProperties: false
              examples:
                Internal Server Error:
                  value:
                    origin: HoD
                    response:
                      error:
