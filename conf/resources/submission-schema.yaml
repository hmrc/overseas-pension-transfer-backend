---
openapi: 3.0.1
info:
  title: QROPS Transfer
  description: "This API specification describes the data structures and operations\
    \ to compile, submit and retrieve the Qualifying Recognised Overseas Pension Scheme(QROPS)\
    \ Transfer. QROPS Transfers(QT's) will be filed by a Pension Scheme Administrator\
    \ (PSA) or authorised Pension Scheme Practitioner (PSP). \n\nThis API will allow\
    \ synchronous request to ETMP from MDTP (via HIP) to File or Retrieve QROPS Transfer\
    \ for a given Pension Scheme Tax Reference (PSTR).\n\nThere are at present the\
    \ following operations:\n1)\tSubmit or compile one or more QROPS Transfer.\n2)\t\
    Retrieve one or more QROPS Transfer.\n\n**EPID references:** \n \n -HIP OAS EPID1585\
    \ \n\n-EPID1561 \n\n-EPID1562\n\n```\n```\n**Change Log**\n| Version | Date |\
    \ Author | Description |\n|---|-----|------|-----|\n|0.1.0 | 2025-03-28 | Shubham\
    \ Patel | Initial draft (EPID1561 version 0.1 & EPID1562 version 0.1)  |\n |0.1.1\
    \ | 2025-04-16 | Shubham Patel |Updated the API Name\n ||||Updated the enum of\
    \ 'X-Message-Type' in GET Operation\n |0.1.2 | 2025-04-30 | Shubham Patel |Removed\
    \ the Contact section\n |0.2.0 | 2025-05-12 | Shubham Patel |Approved by HIP and\
    \ Digital Team \n |0.2.1 | 2025-06-18 | Shubham Patel |Changes in GET and POST\
    \ operation:Updated the \"correlationid\" Regex, \n ||||Updated the length of\
    \ \"qropsRef\" to '11' and added pattern, Updated the max length of \"title\"\
    \ to '4' \n |0.3.0 | 2025-07-08 | Shubham Patel |Approved by HIP and Digital Team\n\
    |0.3.1 | 2025-10-03 | Manasi Kesarkar |Updated for PODS QT Dec 2025\n||||1. Changes\
    \ for POST Operation: Updated datatype of fields \"reasonNoOverseasTransfer\"\
    \ and \"applicableExclusion\" from string to array for Request structure and updated\
    \ Request example to reflect same. Updated Error Response Schema\n||||2. Changes\
    \ for GET Operation: Updated datatype of fields \"reasonNoOverseasTransfer\" and\
    \ \"applicableExclusion\" from string to array for Response structure and updated\
    \ Response example to reflect same. |1.0.0 | 2025-10-22 | Manasi Kesarkar |Updated\
    \ for PODS QT Dec 2025\n|||| Changes in GET and POST operation:Updated the  correlationidResponseType\"\
    \ Regex"
  termsOfService: http://INSERT_LINK_TO_SLA_HERE
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0
