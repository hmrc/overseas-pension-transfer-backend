  x-integration-catalogue:
    api-type: SIMPLE
    reviewed-date: 2025-10-13T13:13:10.175506913Z
    short-description: Qualifying Recognised Overseas Pension Scheme Transfer
    status: BETA
    platform: HIP
    backends:
    - etmp
    domain: "1"
    sub-domain: "1.11"
